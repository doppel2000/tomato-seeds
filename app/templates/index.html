<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Variétés de Tomates</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap"
    rel="stylesheet">
  <!-- Tailwind CSS for modals and interactive UI components -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Alpine.js for modal and local UI states -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <script>
    // Tailor Tailwind prefix or config if needed, here we customize standard colors
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            tomato: {
              red: '#C0392B',
              darkred: '#7B241C',
              green: '#2C5F2E',
              cream: '#FAF6F0',
            }
          }
        }
      }
    }
  </script>

  <style>
    :root {
      --rouge: #C0392B;
      --rouge-clair: #E8C4BF;
      --rouge-fonce: #7B241C;
      --vert: #2C5F2E;
      --vert-clair: #A8D5A2;
      --creme: #FAF6F0;
      --brun: #5C3D2E;
      --texte: #2C1810;
      --texte-muted: #6B4C3B;
      --bordure: #DDD0C8;
    }

    /* Reset basic rules to avoid conflict with Tailwind */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Lato', sans-serif;
      background-color: var(--creme);
      color: var(--texte);
    }

    header {
      background-color: var(--rouge-fonce);
      padding: 3.5rem 2rem 2.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: radial-gradient(circle at 20% 80%, rgba(192, 57, 43, 0.4) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(44, 95, 46, 0.3) 0%, transparent 50%);
      pointer-events: none;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3.2rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.02em;
      position: relative;
    }

    header .sous-titre {
      font-family: 'Lato', sans-serif;
      font-size: 1rem;
      font-weight: 300;
      color: var(--rouge-clair);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 0.5rem;
      position: relative;
    }

    header .ornement {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-top: 1.2rem;
      position: relative;
    }

    header .ornement span {
      display: block;
      width: 60px;
      height: 1px;
      background: rgba(255, 255, 255, 0.3);
    }

    header .ornement svg {
      width: 20px;
      height: 20px;
      fill: var(--rouge-clair);
      opacity: 0.7;
    }

    .compteur {
      text-align: center;
      padding: 1rem;
      font-size: 0.85rem;
      color: var(--texte-muted);
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--bordure);
      background: white;
    }

    .grille {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 0;
      max-width: 1400px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
      gap: 2rem;
    }

    .carte {
      background: white;
      border: 1px solid var(--bordure);
      border-radius: 2px;
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .carte:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(123, 36, 28, 0.12);
    }

    .carte-image {
      position: relative;
      height: 220px;
      overflow: hidden;
      background: var(--rouge-clair);
    }

    .carte-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .carte:hover .carte-image img {
      transform: scale(1.04);
    }

    .badge-type {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(123, 36, 28, 0.85);
      color: #FAE5E3;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 1px;
    }

    .carte-corps {
      padding: 1.4rem 1.5rem 1.6rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .carte-numero {
      font-size: 0.72rem;
      color: var(--rouge);
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .carte-titre {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--brun);
      line-height: 1.25;
    }

    .carte-meta {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.1rem;
    }

    .tag {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 1px;
      font-weight: 400;
      letter-spacing: 0.05em;
    }

    .tag-couleur {
      background: #FEF4E5;
      color: #8B5E1A;
      border: 1px solid #F0D5A0;
    }

    .tag-taille {
      background: #E8F0E8;
      color: #2C5F2E;
      border: 1px solid #A8C8A8;
    }

    .tag-origine {
      background: #EEF0F8;
      color: #3A4A8A;
      border: 1px solid #B0B8D8;
    }

    .separateur {
      height: 1px;
      background: var(--bordure);
      margin: 0.4rem 0;
    }

    .carte-description {
      font-size: 0.88rem;
      line-height: 1.7;
      color: var(--texte-muted);
      flex: 1;
    }

    footer {
      background: var(--rouge-fonce);
      color: rgba(255, 255, 255, 0.5);
      text-align: center;
      padding: 2rem;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      font-weight: 300;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 2.2rem;
      }

      .grille {
        grid-template-columns: 1fr;
        padding: 1.5rem 1rem;
        gap: 1.5rem;
      }
    }
  </style>

  <!-- Alpine.js component definition -->
  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('tomatoApp', () => ({
        isModalOpen: false,
        currentVariety: {},
        persons: {{ persons_json| safe }},
      varieties: {{ varieties_json| safe }},
      searchQuery: "",
      filterOwner: "",
      filterCategory: "",
      filterStock: "",
      currentPage: 1,
      itemsPerPage: 10,

      get filteredVarieties() {
      return this.varieties.filter(v => {
        // 1. Search Query filter (name + description)
        if (this.searchQuery.trim() !== "") {
          const query = this.searchQuery.toLowerCase();
          const nameMatch = v.name && v.name.toLowerCase().includes(query);
          const descMatch = v.description && v.description.toLowerCase().includes(query);
          if (!nameMatch && !descMatch) return false;
        }
        // 2. Owner filter
        if (this.filterOwner !== "") {
          if (v.owner_id != this.filterOwner) return false;
        }
        // 3. Category filter
        if (this.filterCategory !== "") {
          if (v.category !== this.filterCategory) return false;
        }
        // 4. Stock filter
        if (this.filterStock !== "") {
          const inStockFilter = this.filterStock === "1";
          if (v.in_stock !== inStockFilter) return false;
        }
        return true;
      });
    },

      get paginatedVarieties() {
      return this.filteredVarieties.slice((this.currentPage - 1) * this.itemsPerPage, this.currentPage * this.itemsPerPage);
    },

      get totalPages() {
      return Math.ceil(this.filteredVarieties.length / this.itemsPerPage) || 1;
    },

      init() {
      this.$watch("searchQuery", () => this.currentPage = 1);
      this.$watch("filterOwner", () => this.currentPage = 1);
      this.$watch("filterCategory", () => this.currentPage = 1);
      this.$watch("filterStock", () => this.currentPage = 1);
    }
      }));
    });
  </script>
</head>

<body x-data="tomatoApp">

  <header>
    <h1>Variétés de Tomates</h1>
    <div class="ornement">
      <span></span>
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C9 2 6 5 6 8c0 4 6 14 6 14s6-10 6-14c0-3-3-6-6-6z" />
      </svg>
      <span></span>
    </div>
  </header>

  <!-- Filter Controls Bar -->
  <div class="bg-white border-b border-[#DDD0C8] py-4 px-8 shadow-sm">
    <div class="max-w-[1400px] mx-auto flex flex-col md:flex-row gap-4 items-center justify-between">

      <!-- Global Search -->
      <div class="w-full md:max-w-md relative">
        <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
        </span>
        <input type="text" x-model="searchQuery" placeholder="Rechercher par nom ou description..."
          class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded focus:ring-1 focus:ring-red-800 focus:border-red-800 outline-none text-sm text-gray-800">
      </div>

      <!-- Filters Group -->
      <div class="w-full md:w-auto flex flex-col sm:flex-row gap-3 items-center">
        <!-- Owner Filter -->
        <div class="w-full sm:w-48">
          <select x-model="filterOwner"
            class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-1 focus:ring-red-800 focus:border-red-800 outline-none text-sm text-gray-800 bg-white">
            <option value="">Tous les propriétaires</option>
            {% for p in persons %}
            <option value="{{ p.id }}">{{ p.name }}</option>
            {% endfor %}
          </select>
        </div>

        <!-- Category Filter -->
        <div class="w-full sm:w-48">
          <select x-model="filterCategory"
            class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-1 focus:ring-red-800 focus:border-red-800 outline-none text-sm text-gray-800 bg-white">
            <option value="">Toutes les catégories</option>
            {% set categories = [] %}
            {% for v in varieties %}
            {% if v.category and v.category not in categories %}
            {% set _ = categories.append(v.category) %}
            {% endif %}
            {% endfor %}
            {% for cat in categories|sort %}
            <option value="{{ cat }}">{{ cat }}</option>
            {% endfor %}
          </select>
        </div>

        <!-- Stock Filter -->
        <div class="w-full sm:w-48">
          <select x-model="filterStock"
            class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-1 focus:ring-red-800 focus:border-red-800 outline-none text-sm text-gray-800 bg-white">
            <option value="">Tous les stocks</option>
            <option value="1">En stock</option>
            <option value="0">En rupture de stock</option>
          </select>
        </div>
      </div>

    </div>
  </div>

  <!-- Counter -->
  <div class="compteur">
    <span x-text="filteredVarieties.length"></span> variétés sélectionnées
  </div>

  <!-- Dynamic Grid -->
  <div class="grille">
    <template x-for="(variety, index) in paginatedVarieties" :key="variety.id">
      <div class="carte">
        <div class="carte-image">
          <img
            :src="variety.image_url || variety.fallback_image_url || 'https://images.unsplash.com/photo-1558818498-28c1e002b655?w=600&q=80'"
            :alt="variety.name"
            @error="$event.target.src = variety.fallback_image_url || 'https://images.unsplash.com/photo-1558818498-28c1e002b655?w=600&q=80'">

          <template x-if="variety.category">
            <span class="badge-type" x-text="variety.category"></span>
          </template>

          <!-- Edit button overlaid on image -->
          <button
            class="absolute bottom-2 right-2 bg-white/90 hover:bg-white text-gray-700 hover:text-red-700 rounded-full p-2 shadow-md transition duration-200 focus:outline-none flex items-center justify-center border border-gray-100"
            title="Modifier la variété" @click="currentVariety = { ...variety }; isModalOpen = true;">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 011.13-1.897L16.863 4.487zm0 0L19.5 7.125">
              </path>
            </svg>
          </button>
        </div>
        <div class="carte-corps">
          <p class="carte-numero"
            x-text="String((currentPage - 1) * itemsPerPage + index + 1).padStart(2, '0') + ' / ' + String(filteredVarieties.length).padStart(2, '0')">
          </p>
          <h2 class="carte-titre" x-text="variety.name"></h2>
          <div class="carte-meta">
            <!-- Owner Badge -->
            <template x-if="variety.owner_name">
              <span class="tag" style="background: #FFF7ED; color: #C2410C; border: 1px solid #FDBA74;"
                x-text="'Propriétaire : ' + variety.owner_name"></span>
            </template>
            <!-- Stock Status Badge -->
            <template x-if="variety.in_stock">
              <span class="tag" style="background: #F0FDF4; color: #15803D; border: 1px solid #86EFAC;">Graines en
                stock</span>
            </template>
            <template x-if="!variety.in_stock">
              <span class="tag" style="background: #FEF2F2; color: #B91C1C; border: 1px solid #FCA5A5;">Rupture de
                stock</span>
            </template>

            <template x-if="variety.color">
              <span class="tag tag-couleur" x-text="variety.color"></span>
            </template>
            <template x-if="variety.size">
              <span class="tag tag-taille" x-text="variety.size"></span>
            </template>
            <template x-if="variety.origin">
              <span class="tag tag-origine" x-text="variety.origin"></span>
            </template>
          </div>
          <div class="separateur"></div>
          <p class="carte-description" x-text="variety.description || ''"></p>
        </div>
      </div>
    </template>
  </div>

  <!-- Pagination Controls -->
  <div class="max-w-[1400px] mx-auto px-8 pb-12 flex justify-center items-center gap-2" x-show="totalPages > 1">
    <button @click="currentPage--" :disabled="currentPage == 1"
      class="px-4 py-2 border border-gray-300 rounded text-sm font-semibold text-gray-700 bg-white hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition">
      Précédent
    </button>

    <template x-for="p in totalPages" :key="p">
      <button @click="currentPage = p"
        :class="currentPage == p ? 'bg-red-800 text-white border-red-800' : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50'"
        class="w-10 h-10 border rounded text-sm font-semibold flex items-center justify-center transition" x-text="p">
      </button>
    </template>

    <button @click="currentPage++" :disabled="currentPage == totalPages"
      class="px-4 py-2 border border-gray-300 rounded text-sm font-semibold text-gray-700 bg-white hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition">
      Suivant
    </button>
  </div>

  <!-- Modal Dialog -->
  <div x-show="isModalOpen"
    class="fixed inset-0 z-50 overflow-y-auto flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm"
    x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100" x-transition:leave="transition ease-in duration-200"
    x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
    @keydown.escape.window="isModalOpen = false" style="display: none;">

    <!-- Modal Container -->
    <div
      class="bg-white rounded-lg shadow-2xl max-w-2xl w-full mx-auto overflow-hidden border border-gray-200 flex flex-col"
      @click.away="isModalOpen = false" x-transition:enter="transition ease-out duration-300 transform"
      x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
      x-transition:leave="transition ease-in duration-200 transform" x-transition:leave-start="opacity-100 scale-100"
      x-transition:leave-end="opacity-0 scale-95">

      <!-- Modal Header -->
      <div class="bg-red-800 text-white px-6 py-4 flex items-center justify-between">
        <h3 class="text-xl font-semibold font-serif flex items-center gap-2">
          <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C9 2 6 5 6 8c0 4 6 14 6 14s6-10 6-14c0-3-3-6-6-6z" />
          </svg>
          Modifier la variété
        </h3>
        <button @click="isModalOpen = false" class="text-white/80 hover:text-white focus:outline-none">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>

      <!-- Modal Body (Form) -->
      <form @submit.prevent="
        fetch('/api/varieties/' + currentVariety.id, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(currentVariety)
        })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            window.location.reload();
          } else {
            alert(data.message || 'Une erreur est survenue.');
          }
        })
        .catch(err => {
          console.error(err);
          alert('Erreur lors de la sauvegarde.');
        });
      " class="p-6 space-y-4 overflow-y-auto max-h-[75vh]">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- Name -->
          <div>
            <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Nom</label>
            <input type="text" x-model="currentVariety.name" required
              class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-1 focus:ring-red-800 focus:border-red-800 outline-none text-sm text-gray-800">
          </div>
          <!-- Category -->
          <div>
            <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Catégorie</label>
            <input type="text" x-model="currentVariety.category"
              class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-1 focus:ring-red-800 focus:border-red-800 outline-none text-sm text-gray-800">
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- Owner -->
          <div>
            <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Propriétaire</label>
            <select x-model="currentVariety.owner_id"
              class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-1 focus:ring-red-800 focus:border-red-800 outline-none text-sm text-gray-800 bg-white">
              <option value="">-- Sans propriétaire --</option>
              {% for p in persons %}
              <option value="{{ p.id }}">{{ p.name }}</option>
              {% endfor %}
            </select>
          </div>
          <!-- Stock status -->
          <div class="flex items-center pt-5">
            <label class="inline-flex items-center cursor-pointer">
              <input type="checkbox" x-model="currentVariety.in_stock"
                class="w-4 h-4 text-red-800 border-gray-300 rounded focus:ring-red-800">
              <span class="ml-2 text-sm font-semibold text-gray-700">Graines disponibles (En stock)</span>
            </label>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <!-- Color -->
          <div>
            <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Couleur</label>
            <input type="text" x-model="currentVariety.color"
              class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-1 focus:ring-red-800 focus:border-red-800 outline-none text-sm text-gray-800">
          </div>
          <!-- Size -->
          <div>
            <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Taille</label>
            <input type="text" x-model="currentVariety.size"
              class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-1 focus:ring-red-800 focus:border-red-800 outline-none text-sm text-gray-800">
          </div>
          <!-- Origin -->
          <div>
            <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Origine</label>
            <input type="text" x-model="currentVariety.origin"
              class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-1 focus:ring-red-800 focus:border-red-800 outline-none text-sm text-gray-800">
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- Image URL -->
          <div>
            <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Lien de
              l'image</label>
            <input type="text" x-model="currentVariety.image_url"
              class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-1 focus:ring-red-800 focus:border-red-800 outline-none text-sm text-gray-800">
          </div>
          <!-- Fallback Image URL -->
          <div>
            <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Image de secours
              (Fallback)</label>
            <input type="text" x-model="currentVariety.fallback_image_url"
              class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-1 focus:ring-red-800 focus:border-red-800 outline-none text-sm text-gray-800">
          </div>
        </div>

        <!-- Description -->
        <div>
          <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Description</label>
          <textarea x-model="currentVariety.description" rows="4"
            class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-1 focus:ring-red-800 focus:border-red-800 outline-none text-sm text-gray-800"></textarea>
        </div>

        <!-- Modal Footer -->
        <div class="pt-4 border-t border-gray-200 flex justify-end gap-3">
          <button type="button" @click="isModalOpen = false"
